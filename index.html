<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMP 秤料單產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EC;--surface:#FDFCF9;--border:#D8D3C8;--border-dark:#B8B0A0;
  --text:#1A1814;--muted:#6B6560;--light:#9C9590;
  --green:#2D5016;--green-light:#EBF2E3;--green-mid:#5A8A2E;
  --warn:#7A3800;--warn-light:#FEF3E8;
  --mono:'DM Mono',monospace;--serif:'Noto Serif TC',serif;--sans:'Instrument Sans',sans-serif;
  --r:8px;--rl:14px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem}

.logo{font-family:var(--serif);font-size:13px;color:var(--light);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;text-align:center}
.logo span{display:block;font-size:24px;color:var(--text);letter-spacing:0;margin-top:4px}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:2rem;width:100%;max-width:640px;margin-bottom:1rem}

/* Drop zone */
.drop-zone{
  border:2px dashed var(--border-dark);border-radius:var(--rl);
  padding:3rem 2rem;text-align:center;cursor:pointer;
  transition:all 0.2s;background:var(--bg);position:relative;
}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--green-mid);background:var(--green-light)}
.drop-zone input{display:none}
.drop-icon{width:48px;height:48px;margin:0 auto 1rem;color:var(--light)}
.drop-title{font-size:16px;font-weight:500;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--muted)}
.drop-formats{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.fmt-tag{background:var(--bg);border:0.5px solid var(--border);border-radius:4px;padding:3px 10px;font-size:11px;color:var(--muted);font-family:var(--mono)}

/* File preview */
.file-preview{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--green-light);border:0.5px solid var(--green-mid);border-radius:var(--r);margin-top:12px}
.file-icon{width:36px;height:36px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-info{flex:1}
.file-name{font-size:13px;font-weight:500;color:var(--green)}
.file-size{font-size:11px;color:var(--green-mid);margin-top:2px}
.file-remove{background:none;border:none;cursor:pointer;color:var(--green-mid);font-size:18px;padding:0;line-height:1}

/* Status */
.status{display:none;padding:12px 16px;border-radius:var(--r);font-size:13px;margin-top:12px;align-items:center;gap:10px}
.status.loading{background:#F0EFEC;color:var(--muted);border:0.5px solid var(--border);display:flex}
.status.success{background:var(--green-light);color:var(--green);border:0.5px solid var(--green-mid);display:flex}
.status.error{background:var(--warn-light);color:var(--warn);border:0.5px solid #F5C09A;display:flex}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{animation:spin 0.8s linear infinite;flex-shrink:0}

/* Generate button */
.btn-generate{
  width:100%;padding:14px;border-radius:var(--r);border:none;
  background:var(--green);color:#fff;font-family:var(--sans);
  font-size:15px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background 0.15s;margin-top:1rem;
}
.btn-generate:hover{background:#3D6B1F}
.btn-generate:disabled{opacity:0.5;cursor:not-allowed}

/* Result area */
.result-area{display:none;width:100%;max-width:640px}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.result-title{font-family:var(--serif);font-size:16px;font-weight:600}
.btn-download{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--r);
  background:#1D6F42;color:#fff;border:none;
  font-family:var(--sans);font-size:13px;font-weight:500;
  cursor:pointer;transition:background 0.15s;
}
.btn-download:hover{background:#155d35}
.btn-download-txt{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--r);
  background:transparent;color:var(--text);
  border:0.5px solid var(--border);
  font-family:var(--sans);font-size:13px;
  cursor:pointer;transition:background 0.15s;
}
.btn-download-txt:hover{background:var(--bg)}

.preview-box{
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:var(--rl);padding:1.5rem;
  font-size:12px;font-family:var(--mono);color:var(--text);
  white-space:pre-wrap;line-height:1.8;max-height:400px;overflow-y:auto;
}
.doc-tabs{display:flex;gap:4px;margin-bottom:8px}
.doc-tab{padding:5px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all 0.15s}
.doc-tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.doc-panel{display:none}
.doc-panel.active{display:block}

/* Setup overlay */
#setup-overlay{position:fixed;inset:0;background:rgba(26,24,20,0.85);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.setup-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:2.5rem;width:460px;max-width:90vw}
.setup-title{font-family:var(--serif);font-size:22px;font-weight:600;margin-bottom:6px}
.setup-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.setup-warn{background:var(--warn-light);border:0.5px solid #F5C09A;border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--warn);margin-bottom:1.25rem;line-height:1.5}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
input[type=text],input[type=password]{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--r);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.15s}
input:focus{border-color:var(--green-mid)}
.btn-primary{width:100%;padding:11px;border-radius:var(--r);border:none;background:var(--green);color:#fff;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;margin-top:1rem}

/* Settings gear */
.gear-btn{position:fixed;top:1.5rem;right:1.5rem;width:36px;height:36px;border-radius:50%;background:var(--surface);border:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.15s}
.gear-btn:hover{background:var(--bg);color:var(--text)}

.worker-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc}
.dot.on{background:#6DB33F}
</style>
</head>

</div>

<div class="result-area" id="result-area">

    </div>

  <div class="doc-tabs" id="doc-tabs"></div>
  <div id="doc-panels"></div>
</div>

function lookupSupplier(inci) {
  if (!inci) return {};
  const key = inci.trim().toUpperCase();
  if (SUPPLIER_DB[key]) return SUPPLIER_DB[key];
  for (const [k, v] of Object.entries(SUPPLIER_DB)) {
    if (key.includes(k) || k.includes(key)) return v;
  }
  return {};
}

function init() {
  const url = localStorage.getItem('gmp_worker_url');
  if (url) {
    document.getElementById('setup-overlay').style.display = 'none';
    document.getElementById('worker-dot').classList.add('on');
    document.getElementById('worker-label').textContent = url.replace('https://','');
  }
}

function saveWorkerUrl() {
  const url = document.getElementById('setup-url').value.trim();
  if (!url.startsWith('https://')) { alert('請輸入有效網址（以 https:// 開頭）'); return; }
  localStorage.setItem('gmp_worker_url', url);
  document.getElementById('setup-overlay').style.display = 'none';
  document.getElementById('worker-dot').classList.add('on');
  document.getElementById('worker-label').textContent = url.replace('https://','');
}

function openSettings() {
  const url = localStorage.getItem('gmp_worker_url') || '';
  document.getElementById('setup-url').value = url;
  document.getElementById('setup-overlay').style.display = 'flex';
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
}

function handleFile(f) {
  if (!f) return;
  uploadedFile = f;
  document.getElementById('file-name-text').textContent = f.name;
  document.getElementById('file-size-text').textContent = (f.size/1024).toFixed(1) + ' KB';
  document.getElementById('file-preview').style.display = 'flex';
  document.getElementById('btn-generate').disabled = false;

  const isExcel = f.name.match(/\.(xlsx|xls)$/i);
  const isCsv = f.name.match(/\.csv$/i);
  const isImage = f.type.startsWith('image/');
  const isPdf = f.name.match(/\.pdf$/i);
  const isWord = f.name.match(/\.(docx|doc)$/i);

  if (isExcel) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        let text = '';
        wb.SheetNames.forEach(name => {
          text += '【工作表：' + name + '】\n' + XLSX.utils.sheet_to_csv(wb.Sheets[name]) + '\n\n';
        });
        fileContent = text.slice(0, 8000);
        fileType = 'excel';
      } catch(err) { fileContent = ''; }
    };
    reader.readAsArrayBuffer(f);
  } else if (isCsv) {
    const reader = new FileReader();
    reader.onload = e => { fileContent = e.target.result.slice(0, 8000); fileType = 'csv'; };
    reader.readAsText(f, 'utf-8');
  } else if (isImage || isPdf) {
    const reader = new FileReader();
    reader.onload = e => {
      fileBase64 = e.target.result.split(',')[1];
      fileType = isImage ? 'image' : 'pdf';
      fileContent = '';
    };
    reader.readAsDataURL(f);
  } else if (isWord) {
    fileContent = '[Word檔：' + f.name + '，請AI根據檔名和常見配方格式進行解析]';
    fileType = 'word';
  } else {
    const reader = new FileReader();
    reader.onload = e => { fileContent = e.target.result.slice(0, 6000); fileType = 'text'; };
    reader.readAsText(f, 'utf-8');
  }
}

function clearFile() {
  uploadedFile = null; fileContent = ''; fileBase64 = ''; fileType = '';
  document.getElementById('file-preview').style.display = 'none';
  document.getElementById('btn-generate').disabled = true;
  document.getElementById('file-input').value = '';
  document.getElementById('result-area').style.display = 'none';
  setStatus('');
}

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = 'status ' + (type || 'loading');
  el.innerHTML = msg;
}

async function generate() {
  const workerUrl = localStorage.getItem('gmp_worker_url');
  if (!workerUrl) { openSettings(); return; }
  if (!uploadedFile) { alert('請先上傳配方檔案'); return; }

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.innerHTML = '<svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> AI 分析中…';
  setStatus('<svg class="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>&nbsp;AI 正在分析配方，約需 30–60 秒…', 'loading');

  const system = `你是一位 ISO 22716 化妝品 GMP 文件專家。
請從使用者上傳的配方資料中，精確提取以下資訊並以繁體中文輸出：

1. 配方規格書（格式：表格，欄位：相別 | INCI名稱 | 中文名稱 | 單位含量% | 功能）
2. 品管檢驗記錄表（含：外觀、顏色、pH值範圍、黏度、微生物限量、放行欄位）
3. 批次製造記錄 BMR（含：製程步驟、溫度參數、設備、秤量記錄欄位）

每份文件以「=== 文件名稱 ===」開頭。
配方規格書的表格必須包含所有原料，使用 | 分隔欄位。`;

  let messages;
  if ((fileType === 'image' || fileType === 'pdf') && fileBase64) {
    const mediaType = fileType === 'pdf' ? 'application/pdf' : (uploadedFile.type || 'image/jpeg');
    messages = [{
      role: 'user',
      content: [
        { type: fileType === 'pdf' ? 'document' : 'image',
          source: { type: 'base64', media_type: mediaType, data: fileBase64 } },
        { type: 'text', text: '請分析這份配方資料，產生完整的 GMP 文件（配方規格書、品管檢驗記錄表、BMR）。' }
      ]
    }];
  } else {
    messages = [{
      role: 'user',
      content: '以下是配方資料：\n\n' + (fileContent || '（無法讀取檔案內容，請根據檔名「' + uploadedFile.name + '」示範典型配方）') + '\n\n請產生完整的 GMP 文件。'
    }];
  }

  try {
    const resp = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: MODEL, max_tokens: 4000, system, messages })
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || '呼叫 API 失敗');
    }
    const data = await resp.json();
    const fullText = data.content.map(b => b.text || '').join('');
    generatedDocs = parseDocs(fullText);
    renderResult(generatedDocs);
    setStatus('✓ 文件產生完成，可下載 Excel 秤料單', 'success');
  } catch(err) {
    setStatus('✗ 錯誤：' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg> 產生秤料單';
  }
}

function parseDocs(text) {
  const result = {};
  const headers = [...text.matchAll(/={3,}([^=]+)={3,}/g)].map(m => m[1].trim());
  const parts = text.split(/={3,}[^=]+={3,}/);
  if (headers.length > 0 && parts.length > 1) {
    headers.forEach((h, i) => { result[h] = (parts[i+1] || '').trim(); });
  } else {
    result['完整文件'] = text;
  }
  return result;
}

function renderResult(docs) {
  const tabsEl = document.getElementById('doc-tabs');
  const panelsEl = document.getElementById('doc-panels');
  tabsEl.innerHTML = ''; panelsEl.innerHTML = '';
  Object.keys(docs).forEach((key, i) => {
    const tab = document.createElement('button');
    tab.className = 'doc-tab' + (i===0?' active':'');
    tab.textContent = key;
    tab.onclick = () => {
      document.querySelectorAll('.doc-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.doc-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-'+i).classList.add('active');
    };
    tabsEl.appendChild(tab);
    const panel = document.createElement('div');
    panel.className = 'doc-panel preview-box' + (i===0?' active':'');
    panel.id = 'panel-'+i;
    panel.textContent = docs[key];
    panelsEl.appendChild(panel);
  });
  document.getElementById('result-area').style.display = 'block';
  document.getElementById('result-area').scrollIntoView({behavior:'smooth',block:'start'});
}

function downloadTxt() {
  const all = Object.entries(generatedDocs).map(([k,v])=>'=== '+k+' ===\n\n'+v).join('\n\n\n');
  const fname = (uploadedFile?.name.replace(/\.[^.]+$/,'') || 'GMP文件') + '_' + new Date().toISOString().split('T')[0] + '.txt';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([all],{type:'text/plain;charset=utf-8'}));
  a.download = fname; a.click();
}

function parseIngredients(text) {
  const rows = [];
  let lastPhase = 'A';
  for (const line of text.split('\n')) {
    if (!line.startsWith('|')) continue;
    const cells = line.split('|').map(c=>c.trim()).filter(c=>c);
    if (!cells.length || cells[0]==='相別' || cells[0].startsWith('-')) continue;
    const phase = cells[0].match(/^[A-Z]$/) ? cells[0] : lastPhase;
    if (cells[0].match(/^[A-Z]$/)) lastPhase = phase;
    const inci = cells[1] || '';
    const pct = parseFloat(cells[3] || cells[2] || '') || 0;
    if (inci && pct > 0) rows.push({phase, inci, pct});
  }
  return rows;
}

function downloadExcel() {
  const fname = (uploadedFile?.name.replace(/\.[^.]+$/,'') || 'GMP秤料單') + '_' + new Date().toISOString().split('T')[0];
  const formulaText = generatedDocs['配方規格書'] || Object.values(generatedDocs)[0] || '';
  const ings = parseIngredients(formulaText);
  const wb = XLSX.utils.book_new();

  if (ings.length > 0) {
    const batchG = 62500;
    const aoa = [
      ['機器清潔確認','','製造前','是□    否□','品   名',fname,'','','樣品批號',''],
      ['','批   量','','','',batchG,'','g','日   期',new Date().toISOString().split('T')[0]],
      [],[],
      ['相別','廠商名稱','廠商編號','產品編號','原料批號','原  料  名  稱','INCI','單位含量','配方量','','秤 料 量','投料確認'],
    ];
    let lastPh = '';
    ings.forEach((ing, i) => {
      const sup = lookupSupplier(ing.inci);
      const rowN = 6 + i;
      aoa.push([
        ing.phase !== lastPh ? ing.phase : '',
        sup.company||'', sup.supplierCode||'', sup.productCode||'', '',
        ing.inci, ing.inci, ing.pct,
        {f:`H${rowN}*F3`}, 'Gm', '', ''
      ]);
      lastPh = ing.phase;
    });
    const totalR = 6 + ings.length;
    aoa.push(['','','','','','','','',{f:`SUM(I6:I${totalR-1})`},'Gm']);
    aoa.push(['','包材部分']);
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:6},{wch:20},{wch:10},{wch:16},{wch:12},{wch:22},{wch:22},{wch:10},{wch:12},{wch:4},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, '秤料單');
  }

  Object.entries(generatedDocs).forEach(([name, content]) => {
    if (name==='配方規格書' && ings.length>0) return;
    const rows = [];
    content.split('\n').forEach(line => {
      if (line.startsWith('|')) rows.push(line.split('|').map(c=>c.trim()).filter(c=>c));
      else if (line.trim()) rows.push([line.trim()]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows.length ? rows : [[content]]);
    ws['!cols'] = Array(20).fill({wch:20});
    XLSX.utils.book_append_sheet(wb, ws, name.replace(/[\[\]\*\/\\\?:]/g,'').slice(0,31));
  });

  XLSX.writeFile(wb, fname + '.xlsx');
}
